name: Release Build

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  # macOS build
  build-mac:
    strategy:
      matrix:
        include:
          - arch: x64
            artifact_name: mac-x64
          - arch: arm64
            artifact_name: mac-arm64
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build application
        run: pnpm run build

      - name: Build and Package macOS
        run: pnpm exec electron-builder build --publish never --mac --${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/build/*.dmg
            release/build/*.zip
          retention-days: 5

  # Linux build
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build application
        run: pnpm run build

      - name: Build and Package Linux
        run: pnpm exec electron-builder build --publish never --linux

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux
          path: |
            release/build/*.AppImage
            release/build/*.deb
          retention-days: 5

  # Windows build
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build application
        run: pnpm run build

      - name: Build and Package Windows
        run: pnpm exec electron-builder build --publish never --win

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: |
            release/build/*.exe
          retention-days: 5

  # Android build
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Get version info
        id: version_info
        run: |
          VERSION=$(node -p "require('./package.json').version")
          VERSION_PARTS=(${VERSION//./ })
          VERSION_CODE=$((${VERSION_PARTS[0]}*10000+${VERSION_PARTS[1]}*100+${VERSION_PARTS[2]}))
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Build renderer for mobile
        run: pnpm run build:renderer
        env:
          CHATBOX_BUILD_TARGET: mobile_app
          CHATBOX_BUILD_PLATFORM: android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate signing key
        id: generate_key
        run: |
          # Generate keystore if not exists in secrets
          if [ -z "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "Generating new signing key..."
            keytool -genkey -v -keystore android/app/patent-hub.keystore \
              -alias patent-hub \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass PatentHub@2026 \
              -keypass PatentHub@2026 \
              -dname "CN=PatentHub, OU=PatentHub, O=PatentHub, L=Shanghai, ST=Shanghai, C=CN"
          else
            echo "Using existing signing key from secrets..."
            echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/patent-hub.keystore
          fi

      - name: Create signing config
        run: |
          cd android/app
          # Create local.properties with keystore info
          echo " keystorePassword=PatentHub@2026" >> gradle.properties
          echo " keyAlias=patent-hub" >> gradle.properties
          echo " keyPassword=PatentHub@2026" >> gradle.properties

      - name: Fix gradlew permissions
        run: chmod +x android/gradlew

      - name: Build Android APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease
        env:
          APP_VERSION_NAME: ${{ steps.version_info.outputs.version }}
          APP_VERSION_CODE: ${{ steps.version_info.outputs.version_code }}

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Rename and copy APK
        run: |
          mkdir -p release/build
          cp android/app/build/outputs/apk/release/app-release.apk release/build/PatentHub-android.apk 2>/dev/null || \
          cp android/app/build/outputs/apk/debug/app-debug.apk release/build/PatentHub-android.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            release/build/PatentHub-android.apk
          retention-days: 5

  # Create GitHub Release
  create-release:
    needs: [build-mac, build-linux, build-win, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files

      - name: List release files
        run: find release-files -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: PatentHub v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-files/**/*.exe
            release-files/**/*.dmg
            release-files/**/*.AppImage
            release-files/**/*.deb
            release-files/**/*.apk
